version: '3.9'

services:
  mongodb:
    image: mongo:latest
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: travel_app
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/travel_app
      JWT_SECRET: dev_secret_key_change_in_production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALENDAR_REDIRECT_URI: http://localhost:3001/api/auth/google/callback
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  mongodb_data:
